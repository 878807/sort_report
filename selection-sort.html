<div class="info-box">
  <h2>📘 選擇排序法（Selection Sort）</h2>

  <p>
    選擇排序會從未排序的區域中<strong>找出最小值</strong>，
    然後與當前位置的元素進行交換。
  </p>

  <p>
    每一輪都會確定一個最小值的位置，
    排序好的區域會逐漸從左邊擴大。
  </p>

  <p>
    💡 特色：比較次數固定，但交換次數較少。
  </p>

  <ul>
    <li>時間複雜度：O(n²)</li>
    <li>交換次數最多 n-1 次</li>
    <li>空間複雜度：O(1)</li>
  </ul>
</div>
