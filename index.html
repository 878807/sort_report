<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>排序演算法教學</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI','Microsoft JhengHei', sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  min-height: 100vh;
}

/* 🔥 Header */
header {
  background: linear-gradient(135deg, #1e3a8a, #0ea5e9);
  padding: 40px 20px;
  text-align: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

header h1 {
  font-size: 2.2rem;
  letter-spacing: 2px;
}

header p {
  margin-top: 10px;
  color: #bae6fd;
}

/* 🔥 主區 */
.container {
  max-width: 1100px;
  margin: 40px auto;
  padding: 20px;
}

/* 🔥 卡片 */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
}

.card {
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 16px;
  padding: 24px;
  transition: transform 0.2s, box-shadow 0.2s;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.card h2 {
  margin-bottom: 10px;
  color: #38bdf8;
}

.card p {
  font-size: 0.9rem;
  color: #94a3b8;
  margin-bottom: 20px;
}

/* 🔥 按鈕 */
.btn {
  display: inline-block;
  padding: 10px 18px;
  border-radius: 999px;
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 600;
  transition: 0.2s;
}

.btn-blue {
  background: #0ea5e9;
  color: white;
}

.btn-orange {
  background: #f97316;
  color: white;
}

.btn-purple {
  background: #8b5cf6;
  color: white;
}

.btn:hover {
  opacity: 0.85;
}

/* 🔥 footer */
footer {
  text-align: center;
  margin-top: 40px;
  padding: 20px;
  color: #64748b;
  font-size: 0.8rem;
}
</style>

</head>

<body>

<header>
  <h1>📊 排序演算法視覺化教學</h1>
  <p>互動學習 Bubble / Selection / Insertion Sort</p>
</header>

<div class="container">
  <div class="grid">

    <!-- Bubble -->
    <div class="card">
      <h2>🫧 Bubble Sort</h2>
      <p>反覆比較相鄰元素，將最大值「冒泡」到最後。</p>
      <a href="bubble-sort.html" class="btn btn-blue">進入學習</a>
    </div>

    <!-- Selection -->
    <div class="card">
      <h2>🔍 Selection Sort</h2>
      <p>每一輪找最小值，放到正確位置。</p>
      <a href="selection-sort.html" class="btn btn-orange">進入學習</a>
    </div>

    <!-- Insertion -->
    <div class="card">
      <h2>📌 Insertion Sort</h2>
      <p>逐步插入元素到已排序區域。</p>
      <a href="insertion-sort.html" class="btn btn-purple">進入學習</a>
    </div>

  </div>
</div>

<footer>
  © 2026 Sorting Algorithm Project | GitHub Pages
</footer>

</body>
</html>
