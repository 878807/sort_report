<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insertion Sort</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>

<h1>🔍 Insertion Sort</h1>
<a href="./index.html">← 回首頁</a>

<!-- ✅ 統計（一定要） -->
<div>
  比較次數：<span id="compare">0</span>
  交換次數：<span id="swap">0</span>
</div>

<!-- ✅ 圖表 -->
<div id="bars"></div>

<!-- ✅ 控制 -->
<div class="controls">
  <button onclick="startSort('insertion')">開始</button>
  <button onclick="resetArray()">重設</button>
</div>

<!-- ✅ 說明（放在 body 裡面‼️） -->
<div class="info-box">
  <h2>📘 插入排序法（Insertion Sort）</h2>

  <p>
    插入排序會將元素一個一個插入到<strong>已排序區域的正確位置</strong>，
    就像在整理撲克牌一樣。
  </p>

  <p>
    每加入一個新元素，就會往左比較並移動，
    直到找到適合的位置為止。
  </p>

  <p>
    💡 特色：對「幾乎排序完成」的資料非常有效率。
  </p>

  <ul>
    <li>時間複雜度：平均 O(n²)</li>
    <li>最佳情況：O(n)</li>
    <li>空間複雜度：O(1)</li>
  </ul>
</div>

<!-- ✅ JS -->
<script src="./script.js"></script>

</body>
</html>
