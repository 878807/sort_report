<div class="info-box">
  <h2>📘 插入排序法（Insertion Sort）</h2>

  <p>
    插入排序會將元素一個一個插入到<strong>已排序區域的正確位置</strong>，
    就像在整理撲克牌一樣。
  </p>

  <p>
    每加入一個新元素，就會往左比較並移動，
    直到找到適合的位置為止。
  </p>

  <p>
    💡 特色：對「幾乎排序完成」的資料非常有效率。
  </p>

  <ul>
    <li>時間複雜度：平均 O(n²)</li>
    <li>最佳情況：O(n)</li>
    <li>空間複雜度：O(1)</li>
  </ul>
</div>
