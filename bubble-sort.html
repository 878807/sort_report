<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bubble Sort</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>

<h1>🫧 Bubble Sort</h1>
<a href="./index.html">← 回首頁</a>

<!-- ✅ 統計（一定要有） -->
<div>
  比較次數：<span id="compare">0</span>
  交換次數：<span id="swap">0</span>
</div>

<!-- ✅ 圖表 -->
<div id="bars"></div>

<!-- ✅ 說明 -->
<div class="info-box">
  <h2>📘 氣泡排序法（Bubble Sort）</h2>

  <p>
    氣泡排序是一種<strong>最直觀的排序演算法</strong>，它會不斷比較相鄰的兩個元素，
    若順序錯誤就交換，讓較大的數字逐漸往右「浮」上去。
  </p>

  <p>
    每完成一輪比較，就會有一個最大值被放到正確位置，
    因此後面的元素可以不用再比較。
  </p>

  <p>
    💡 特色：實作簡單，但效率較低，適合教學使用。
  </p>

  <ul>
    <li>時間複雜度：平均 O(n²)</li>
    <li>最佳情況：O(n)（已排序）</li>
    <li>空間複雜度：O(1)</li>
  </ul>
</div>

<!-- ✅ 控制按鈕 -->
<div class="controls">
  <button onclick="startSort('bubble')">開始</button>
  <button onclick="resetArray()">重設</button>
</div>

<!-- ✅ JS（路徑要正確） -->
<script src="./script.js"></script>

</body>
</html>
